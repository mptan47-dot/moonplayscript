<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 DELTA APK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">← GERİ DÖN</a>
        <h1 class="neon-title">2026 DELTA APK</h1>

        <div class="alert-box">
            ⚠️ İndirme bağlantısına erişmek için Telegram kanalımıza katılmalı ve YouTube kanalımıza abone olmalısınız!
        </div>

        <div class="buttons-container">
            <a href="https://t.me/linkin" target="_blank" class="btn btn-telegram" onclick="startVerification()">
                <i class="fab fa-telegram-plane"></i> Telegram'a katılın
            </a>
            <a href="https://youtube.com/linkin" target="_blank" class="btn btn-youtube" onclick="startVerification()">
                <i class="fab fa-youtube"></i> YouTube kanalına abone olun
            </a>
        </div>

        <div class="code-box-container">
            <div class="code-box-header">
                <span>İndirme Bağlantısı Durumu</span>
            </div>
            <div class="code-wrapper" style="min-height: 120px; text-align: center;">
                <div class="lock-overlay" id="lockOverlay">
                    İndirme butonunun açılması için yukarıdaki adımları tamamlayın.
                </div>
                
                <a href=https://mega.nz/file/0mJiDYaA#gKWK0OPDVUnNMEPr5QuvUjc5cm5uUnEngtF38t5u5ng id="downloadBtn" class="btn btn-download" style="display: none;" target="_blank">
                    <i class="fas fa-download"></i> DOWNLOAD
                </a>
            </div>
        </div>
    </div>

    <script>
        let clicked = false; let countdown = 10; let timer;
        function startVerification() {
            if (!clicked) {
                clicked = true;
                const overlay = document.getElementById('lockOverlay');
                timer = setInterval(() => {
                    if (countdown > 0) {
                        overlay.innerText = `Doğrulanıyor... Son ${countdown} saniye.`;
                        countdown--;
                    } else {
                        clearInterval(timer);
                        overlay.style.display = 'none';
                        document.getElementById('downloadBtn').style.display = 'inline-flex';
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
