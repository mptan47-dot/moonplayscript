<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 DELTA APK - MOONPLAY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">← BACK TO HOME</a>
        <h1 class="neon-title">2026 DELTA APK</h1>

        <div class="alert-box">
            ⚠️ To unlock the download link, you must join our Telegram channel AND subscribe to our YouTube channel!
        </div>

        <div class="buttons-container">
            <a href="https://t.me/+5BGGE1G9kWoyM2I0" target="_blank" class="btn btn-telegram" id="tgBtn" onclick="clickTelegram()">
                <span id="tgContent"><i class="fab fa-telegram-plane"></i> Join Telegram</span>
                <span id="tg-check" style="margin-left:5px; color:#00ff66; display:none;">✓</span>
            </a>
            <a href="https://youtube.com/@moonplay-y7t?si=RrCNzfDpO6at6wPg" target="_blank" class="btn btn-youtube" id="ytBtn" onclick="clickYoutube()">
                <span id="ytContent"><i class="fab fa-youtube"></i> Subscribe YouTube</span>
                <span id="yt-check" style="margin-left:5px; color:#00ff66; display:none;">✓</span>
            </a>
        </div>

        <div class="code-box-container">
            <div class="code-wrapper" style="min-height: 120px; display: flex; align-items: center; justify-content: center;">
                <div class="lock-overlay" id="lockOverlay">
                    Please complete BOTH steps above to unlock the DOWNLOAD button.
                </div>
                <div class="lock-overlay" id="loadingOverlay" style="display: none; background: #030206; z-index: 6;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #ff0044; margin-bottom: 10px;"></i>
                    <div id="loadingText" style="font-weight: bold; font-size: 1.1rem; color: #fff;">Loading... 10s</div>
                </div>
                <a href="https://mega.nz/file/0mJiDYaA#gKWK0OPDVUnNMEPr5QuvUjc5cm5uUnEngtF38t5u5ng" id="downloadBtn" target="_blank" class="btn btn-download" style="display: none;">
                    <i class="fas fa-download"></i> DOWNLOAD (İNDİR)
                </a>
            </div>
        </div>
    </div>

    <script>
        let hasTelegram = false;
        let hasYoutube = false;
        let tgTimerStarted = false;
        let ytTimerStarted = false;

        function clickTelegram() {
            if (tgTimerStarted) return;
            tgTimerStarted = true;
            
            const tgContent = document.getElementById('tgContent');
            let countdown = 10;
            
            let timer = setInterval(() => {
                if (countdown > 0) {
                    tgContent.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Verifying... ${countdown}s`;
                    countdown--;
                } else {
                    clearInterval(timer);
                    tgContent.innerHTML = `<i class="fab fa-telegram-plane"></i> Join Telegram`;
                    document.getElementById('tg-check').style.display = 'inline';
                    hasTelegram = true;
                    checkBothClicked();
                }
            }, 1000);
        }

        function clickYoutube() {
            if (ytTimerStarted) return;
            ytTimerStarted = true;
            
            const ytContent = document.getElementById('ytContent');
            let countdown = 10;
            
            let timer = setInterval(() => {
                if (countdown > 0) {
                    ytContent.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Verifying... ${countdown}s`;
                    countdown--;
                } else {
                    clearInterval(timer);
                    ytContent.innerHTML = `<i class="fab fa-youtube"></i> Subscribe YouTube`;
                    document.getElementById('yt-check').style.display = 'inline';
                    hasYoutube = true;
                    checkBothClicked();
                }
            }, 1000);
        }

        function checkBothClicked() {
            if (hasTelegram && hasYoutube) {
                document.getElementById('lockOverlay').style.display = 'none';
                const loadingOverlay = document.getElementById('loadingOverlay');
                const loadingText = document.getElementById('loadingText');
                loadingOverlay.style.display = 'flex';
                loadingOverlay.style.flexDirection = 'column';

                let countdown = 10;
                let timer = setInterval(() => {
                    if (countdown > 0) {
                        loadingText.innerText = `Loading... ${countdown}s`;
                        countdown--;
                    } else {
                        clearInterval(timer);
                        loadingOverlay.style.display = 'none';
                        document.getElementById('downloadBtn').style.display = 'inline-flex';
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
