<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murder Mystery 2 Script - MoonPlayScript</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .script-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background-color: #150f22;
            border: 2px solid #2d1f47;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }

        .back-link {
            display: inline-block;
            color: #a29bfe;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: color 0.3s, transform 0.2s;
        }

        .back-link:hover {
            color: #bf55ec;
            transform: translateX(-5px);
        }

        .alert-box {
            background: rgba(191, 85, 236, 0.1);
            border-left: 4px solid #bf55ec;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            color: #e2d5f3;
            font-size: 0.95rem;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.3s;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
        }

        /* SVG Logolar */
        .btn-social svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
